        - generic [ref=e69]:
          - heading "Log what you watch" [level=2] [ref=e70]
          - paragraph [ref=e71]: Every post can carry a film — a first watch, a rewatch, a half-star rating, a long review, a hot take at 2am. Logs land in your diary. Reviews stay on your profile. Threads can run for days.
          - paragraph [ref=e72]: This is not a spreadsheet you update in private. It is a public record of taste that other people can follow, reply to, and argue with.
        - generic [ref=e73]:
          - heading "Profiles built from taste" [level=2] [ref=e74]
          - paragraph [ref=e75]: Your 35mm profile is the films you have seen, the ones you would defend, and the ones you would never sit through again. Favourites on display. Ratings in your diary. A history of what cinema means to you — not a résumé with a poster pasted on.
          - paragraph [ref=e76]: When someone visits your page, they should understand how you watch movies before they read a single word of your bio.
        - generic [ref=e77]:
          - heading "A feed you choose" [level=2] [ref=e78]
          - paragraph [ref=e79]: Follow filmmakers whose work you study. Follow critics who hate the same franchises you do. Follow friends from film school, programmers you met at a festival, the person who posted a perfect thread about Jeanne Dielman.
          - paragraph [ref=e80]: Your home timeline is built from those follows — film logs, festival dispatches, shorts, recommendations, and arguments that go long after midnight. No trending tab. No engagement bait. Just people you decided to hear from.
        - generic [ref=e81]:
          - heading "Who 35mm is for" [level=2] [ref=e82]
          - paragraph [ref=e83]: Directors and DPs sharing work and influences. Critics and programmers writing in public. Students building a canon. Casual viewers who care enough to log and rate. Anyone who would rather talk about a film than scroll past it.
          - paragraph [ref=e84]: Free to join. Claim a username, follow a few people, and your feed starts there.
